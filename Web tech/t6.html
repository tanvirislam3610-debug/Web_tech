<!DOCTYPE html>
<html>
<head>
    <title>Loop and Factorial Example</title>
</head>
<body>

<h2>Check Browser Console Output</h2>

<script>

// Loop through Numbers (1 to 10)
for (var i = 1; i <= 10; i++) {
    console.log(i);
}


// Factorial of a Number
var num = 5;
var factorial = 1;

for (var i = num; i > 0; i--) {
    factorial *= i;
}

console.log("Factorial of " + num + " is: " + factorial);

</script>

</body>
</html>
